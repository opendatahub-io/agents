name: Responses API Testing

on:
  pull_request:
    branches:
      - main
      - rhoai-v*
    types:
      - opened
      - synchronize
    paths:
      - '.github/workflows/responses-api-test.yml'
      - 'tests/**'
  push:
    branches:
      - main
      - rhoai-v*
      - responses_api_test_workflow

  # Allow manual triggering
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: llama-stack-local
  VLLM_INFERENCE_MODEL: openai/gpt-oss-20b
  EMBEDDING_MODEL: sentence-transformers/ibm-granite/granite-embedding-125m-english

jobs:
  test-responses-api:
    runs-on: ubuntu-latest
    environment: Tests
    env:
      VLLM_URL: ${{ vars.VLLM_URL }}
      VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: llamastack
      POSTGRES_USER: llamastack
      POSTGRES_PASSWORD: llamastack
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone llama-stack
        run: |
          git clone https://github.com/meta-llama/llama-stack.git /tmp/llama-stack

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build llama-stack image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: /tmp/llama-stack
          file: /tmp/llama-stack/containers/Containerfile
          platforms: linux/amd64
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Unset cloud provider credentials for fork PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "Unsetting cloud provider credentials for fork PR (secrets not available)"
          echo "VLLM_URL=" >> "$GITHUB_ENV"
          echo "VLLM_API_KEY=" >> "$GITHUB_ENV"

      - name: Setup PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_DB=${{ env.POSTGRES_DB }} \
            -e POSTGRES_USER=${{ env.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            -p ${{ env.POSTGRES_PORT }}:5432 \
            postgres:15-alpine

          # Wait for PostgreSQL to be ready
          for i in {1..30}; do
            if docker exec postgres pg_isready -U ${{ env.POSTGRES_USER }} > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "PostgreSQL failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Generate llama-stack config
        run: |
          mkdir -p /tmp/llama-stack-config

          cat > /tmp/llama-stack-config/config.yaml <<'EOF'
          version: 2
          distro_name: test-distro
          apis:
            - agents
            - files
            - inference
            - tool_runtime
            - vector_io
          providers:
            inference:
              - provider_id: vllm
                provider_type: remote::vllm
                config:
                  base_url: ${env.VLLM_URL:=}
                  max_tokens: 4096
                  api_token: ${env.VLLM_API_KEY:=}
                  tls_verify: true
              - provider_id: sentence-transformers
                provider_type: inline::sentence-transformers
                config: {}
            vector_io:
              - provider_id: faiss
                provider_type: inline::faiss
                config:
                  persistence:
                    namespace: vector_io::faiss
                    backend: kv_default
            files:
              - provider_id: localfs
                provider_type: inline::localfs
                config:
                  storage_dir: /tmp/llama-stack-files
                  metadata_store:
                    table_name: files_metadata
                    backend: sql_default
            agents:
              - provider_id: meta-reference
                provider_type: inline::meta-reference
                config:
                  max_infer_iters: 20
                  persistence:
                    agent_state:
                      namespace: agents
                      backend: kv_default
                    responses:
                      table_name: responses
                      backend: sql_default
                      max_write_queue_size: 10000
                      num_writers: 4
            tool_runtime:
              - provider_id: rag-runtime
                provider_type: inline::rag-runtime
                config: {}
          storage:
            backends:
              kv_default:
                type: kv_postgres
                host: ${env.POSTGRES_HOST:=localhost}
                port: ${env.POSTGRES_PORT:=5432}
                database: ${env.POSTGRES_DB:=llamastack}
                user: ${env.POSTGRES_USER:=llamastack}
                password: ${env.POSTGRES_PASSWORD:=llamastack}
              sql_default:
                type: sql_postgres
                host: ${env.POSTGRES_HOST:=localhost}
                port: ${env.POSTGRES_PORT:=5432}
                database: ${env.POSTGRES_DB:=llamastack}
                user: ${env.POSTGRES_USER:=llamastack}
                password: ${env.POSTGRES_PASSWORD:=llamastack}
            stores:
              metadata:
                namespace: registry
                backend: kv_default
              inference:
                table_name: inference_store
                backend: sql_default
                max_write_queue_size: 10000
                num_writers: 4
              conversations:
                table_name: openai_conversations
                backend: sql_default
              prompts:
                namespace: prompts
                backend: kv_default
          registered_resources:
            models:
              - model_id: ${{ env.VLLM_INFERENCE_MODEL }}
                provider_id: vllm
                provider_model_id: ${{ env.VLLM_INFERENCE_MODEL }}
                model_type: llm
              - model_id: ${{ env.EMBEDDING_MODEL }}
                provider_id: sentence-transformers
                provider_model_id: ${{ env.EMBEDDING_MODEL }}
                model_type: embedding
                metadata:
                  embedding_dimension: 768
            tool_groups:
              - toolgroup_id: builtin::rag
                provider_id: rag-runtime
          server:
            port: 8321
          vector_stores:
            default_provider_id: faiss
            default_embedding_model:
              provider_id: sentence-transformers
              model_id: ${{ env.EMBEDDING_MODEL }}
          EOF

          echo "Generated config:"
          cat /tmp/llama-stack-config/config.yaml

      - name: Start llama-stack container
        shell: bash
        run: |
          echo "=== Configuration ==="
          echo "VLLM_URL: ${VLLM_URL:-<not set>}"
          echo "VLLM_API_KEY: ${VLLM_API_KEY:+***set***}"
          echo "VLLM_INFERENCE_MODEL: $VLLM_INFERENCE_MODEL"
          echo "EMBEDDING_MODEL: $EMBEDDING_MODEL"

          docker run -d \
            --pull=never \
            --net=host \
            -p 8321:8321 \
            -v /tmp/llama-stack-config:/config \
            --env "VLLM_URL=$VLLM_URL" \
            --env "VLLM_API_KEY=$VLLM_API_KEY" \
            --env "POSTGRES_HOST=$POSTGRES_HOST" \
            --env "POSTGRES_PORT=$POSTGRES_PORT" \
            --env "POSTGRES_DB=$POSTGRES_DB" \
            --env "POSTGRES_USER=$POSTGRES_USER" \
            --env "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" \
            --name llama-stack-responses-test \
            --entrypoint /bin/bash \
            "$IMAGE_NAME:$GITHUB_SHA" \
            -c "llama stack run /config/config.yaml"

          echo "Started Llama Stack container for responses API testing..."

          # Wait for llama stack to be ready
          echo "Waiting for Llama Stack server..."
          for i in {1..60}; do
            echo "Attempt $i to connect to Llama Stack..."
            resp=$(curl -fsS http://127.0.0.1:8321/v1/health || echo "failed")
            if [ "$resp" == '{"status":"OK"}' ]; then
              echo "Llama Stack server is up!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Llama Stack server failed to start :("
              docker logs llama-stack-responses-test || true
              exit 1
            fi
            sleep 1
          done

      - name: Debug llama-stack configuration
        run: |
          echo "=== Checking llama-stack models and providers ==="
          curl -s http://127.0.0.1:8321/v1/models | jq '.' || echo "Failed to query models"
          curl -s http://127.0.0.1:8321/v1/providers | jq '.' || echo "Failed to query providers"

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          python-version: "3.13"
          version: 0.7.6

      - name: Run responses API tests from upstream llama-stack
        shell: bash
        env:
          LLAMA_STACK_BASE_URL: http://127.0.0.1:8321
          VLLM_INFERENCE_MODEL: ${{ env.VLLM_INFERENCE_MODEL }}
          EMBEDDING_MODEL: ${{ env.EMBEDDING_MODEL }}
        run: |
          set +e
          ./tests/run_responses_api_tests.sh 2>&1 | tee /tmp/test-output.log
          TEST_EXIT_CODE=${PIPEFAIL[0]:-$?}
          set -e

          # Extract test summary from pytest output
          SUMMARY_LINE=$(grep -E "^(=+ .* =+|[0-9]+ passed)" /tmp/test-output.log | tail -1 || echo "")

          # Parse the summary
          TOTAL=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= collected)' || echo "0")
          PASSED=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= passed)' || echo "0")
          FAILED=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= failed)' || echo "0")
          ERRORS=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= error)' || echo "0")

          # Save for next step
          echo "TOTAL_TESTS=$TOTAL" >> "$GITHUB_ENV"
          echo "PASSED_TESTS=$PASSED" >> "$GITHUB_ENV"
          echo "FAILED_TESTS=$FAILED" >> "$GITHUB_ENV"
          echo "ERROR_TESTS=$ERRORS" >> "$GITHUB_ENV"
          echo "TEST_EXIT_CODE=$TEST_EXIT_CODE" >> "$GITHUB_ENV"

          exit $TEST_EXIT_CODE

      - name: Generate test summary
        if: always()
        shell: bash
        run: |
          echo "## Responses API Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total Tests | ${TOTAL_TESTS:-N/A} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ✅ Passed | ${PASSED_TESTS:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ❌ Failed | ${FAILED_TESTS:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚠️ Errors | ${ERROR_TESTS:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${TEST_EXIT_CODE:-1}" -eq 0 ]; then
            echo "✅ **All tests passed!**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ **Some tests failed or had errors**" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Inference Model:** ${{ env.VLLM_INFERENCE_MODEL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Embedding Model:** ${{ env.EMBEDDING_MODEL }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Gather logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Llama Stack Container logs ==="
          docker logs llama-stack-responses-test || true
          echo "=== PostgreSQL logs ==="
          docker logs postgres || true

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          docker rm -f llama-stack-responses-test postgres || true
